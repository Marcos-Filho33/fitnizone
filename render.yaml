services:
  - type: web
    name: fitzone-backend
    env: node
    plan: starter
    buildCommand: npm ci && cd backend && npm run build
    startCommand: cd backend && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://marcos-filho33.github.io
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_SECRET
        sync: false
      - key: CSRF_SECRET
        value: csrf-production-secret-fitnizone
      - key: SYSTEM_ADMIN_EMAIL
        value: admin@fitzone.com.br
      - key: SYSTEM_ADMIN_PASSWORD
        value: Admin@123
